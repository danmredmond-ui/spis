<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1B2A;--card:#111E2E;--border:#1E3A5F;
  --cyan:#00C2CB;--blue:#00A1E0;--amber:#F59E0B;
  --text:#E2E8F0;--muted:#94A3B8;--dim:#64748B;
  --green:#22C55E;--red:#EF4444;--sw:220px;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
.mono{font-family:'IBM Plex Mono',monospace}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
.sidebar{width:var(--sw);min-width:var(--sw);height:100vh;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;position:fixed;left:0;top:0;z-index:20}
.sb-logo{padding:14px 16px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--cyan);letter-spacing:.12em}
.sb-logo span{display:block;font-size:9px;font-weight:400;color:var(--muted);letter-spacing:.06em;margin-top:2px;text-transform:uppercase}
.sb-section{padding:6px 0;flex:1}
.sb-label{padding:8px 16px 4px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:12.5px;color:var(--muted);border-left:3px solid transparent;transition:all .12s;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--cyan);border-left-color:var(--cyan);background:rgba(0,194,203,.06)}

.seller-card:hover{background:rgba(255,255,255,.03)}
.seller-card.active{border-color:var(--border);background:rgba(0,194,203,.06)}
.seller-name{font-size:12px;font-weight:600;margin-bottom:2px}
.seller-meta{font-size:10px;color:var(--muted);display:flex;gap:10px;margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.pbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .3s}
.main{margin-left:var(--sw);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:50px;min-height:50px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:10}
.content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 18px}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.score-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);padding:8px 10px;border-bottom:1px solid var(--border)}
.table td{padding:10px;border-bottom:1px solid rgba(30,58,95,.4);font-size:12.5px}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:rgba(255,255,255,.015)}
.tabs-row{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{padding:8px 14px;cursor:pointer;font-size:12.5px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:'IBM Plex Sans',sans-serif;transition:all .12s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}

.sf-field{background:rgba(0,161,224,.06);border:1px solid rgba(0,161,224,.18);border-radius:6px;padding:10px 12px}

button{cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;border:none;border-radius:6px;padding:7px 14px;transition:all .12s}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--cyan);color:#0D1B2A}
.btn-primary:hover:not(:disabled){background:#00d4de}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){background:rgba(255,255,255,.11)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover:not(:disabled){background:#0090cc}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover:not(:disabled){background:#16a34a}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover:not(:disabled){background:#dc2626}
.btn-amber{background:var(--amber);color:#0D1B2A}
select{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:12px;padding:5px 8px;outline:none}
textarea{font-family:'IBM Plex Sans',sans-serif}
.callout-warn{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.28);border-radius:6px;padding:10px 12px;font-size:12px;color:#fca5a5}
.callout-info{background:rgba(0,194,203,.07);border:1px solid rgba(0,194,203,.22);border-radius:6px;padding:10px 12px;font-size:12px;color:var(--cyan)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.grid-4-2{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.row{display:flex;align-items:center;gap:10px}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
h2{font-size:18px;font-weight:700}
h3{font-size:14px;font-weight:600}
h4{font-size:12px;font-weight:600}
.tier-1-btn{background:rgba(0,194,203,.1);border:1px solid rgba(0,194,203,.3);color:var(--cyan);border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;transition:all .12s;margin-right:6px;margin-bottom:6px;display:inline-block}

.api-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:40px 20px}
input[type="password"],input[type="text"]{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:10px 14px;outline:none;width:100%}

.heat-card{border-radius:8px;padding:16px;cursor:pointer;transition:all .15s;background:var(--card)}
.heat-card:hover{transform:translateY(-1px)}
.heat-green{border:2px solid var(--green)}
.heat-amber{border:2px solid var(--amber)}
.heat-red{border:2px solid var(--red)}
.section-gap{margin-bottom:24px}
</style>

const fmtM = n => {
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n;
};
const fmtPct = n => (n * 100).toFixed(0) + '%';
const covRatio = (pipeline, quota) => pipeline / quota;
const covStr = (pipeline, quota) => (pipeline/quota).toFixed(1) + 'x';
const scoreColor = s => s >= 80 ? '#22C55E' : s >= 60 ? '#F59E0B' : '#EF4444';
const covColor = r => r >= 3.5 ? '#22C55E' : r > 2.45 ? '#F59E0B' : '#EF4444';
const heatRatio = r => r >= 1.0 ? 'green' : r > 0.7 ? 'amber' : 'red';
const statusTag = s => s === 'approved'
  ? { label:'Approved', bg:'rgba(34,197,94,.12)', color:'#22C55E' }
  : { label:'Needs Revision', bg:'rgba(239,68,68,.12)', color:'#EF4444' };
const accessColor = a => a === 'Warm' ? '#22C55E' : a === 'Partner' ? '#00A1E0' : '#94A3B8';
const tierColor = t => t === 1 ? '#00C2CB' : t === 2 ? '#F59E0B' : '#64748B';

// ─── PURSUIT TASK LIST ────────────────────────────────────────────────────────

function PursuitTaskList({ content, accountName }) {
  const [taskStatus, setTaskStatus] = useState({});

  const taskLines = content.split('\n').filter(l => l.trim().startsWith('ACTION:'));
  if (taskLines.length === 0) return <div className="gen-block">{content}</div>;

  const tasks = taskLines.map((line, i) => {
    const actionMatch = line.match(/ACTION:\s*([^|]+)/);
    const stakeholderMatch = line.match(/STAKEHOLDER:\s*([^|]+)/);
    const timelineMatch = line.match(/TIMELINE:\s*(.+)/);
    return {
      index: i,
      action: actionMatch?.[1]?.trim() || '',
      stakeholder: stakeholderMatch?.[1]?.trim() || '',
      timeline: timelineMatch?.[1]?.trim() || '',
    };
  });

  const borderColor = s => s === 'Complete' ? 'var(--green)' : s === 'In Progress' ? 'var(--amber)' : 'var(--border)';
  const bgColor = s => s === 'Complete' ? 'rgba(34,197,94,.07)' : s === 'In Progress' ? 'rgba(245,158,11,.07)' : 'transparent';

  return (
    <div>
      {tasks.map(task => {
        const key = accountName + '_' + task.index;
        const status = taskStatus[key] || 'Not Started';
        return (
          <div key={key} style={{
            border: '1px solid ' + borderColor(status),
            borderLeft: '3px solid ' + borderColor(status),
            background: bgColor(status),
            borderRadius: 8,
            padding: '12px 14px',
            marginBottom: 8,
          }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12 }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:500, color:'var(--text)', marginBottom:6, lineHeight:1.5 }}>{task.action}</div>
                <div style={{ display:'flex', gap:16, fontSize:11, color:'var(--muted)' }}>
                  <span>👤 {task.stakeholder}</span>
                  <span>🗓 {task.timeline}</span>
                </div>
              </div>
              <select
                value={status}
                onChange={e => setTaskStatus(prev => ({...prev, [key]: e.target.value}))}
                style={{ fontSize:11, minWidth:116 }}
              >
                <option>Not Started</option>
                <option>In Progress</option>
                <option>Complete</option>
              </select>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function OverviewRenderer({ content }) {

  const execRaw = content.slice(0, povIdx).replace(/^executive summary[\s:]*/i, '').trim();
  const povRaw  = content.slice(povIdx).replace(/^point of view[^\n]*\n/i, '').trim();

  return (
    <div>
      <div className="card" style={{ marginBottom:14 }}>
        <div style={{ fontSize:10, fontWeight:700, letterSpacing:'.09em', textTransform:'uppercase', color:'var(--muted)', marginBottom:10 }}>Executive Summary</div>
        <p style={{ fontSize:13, lineHeight:1.8, color:'var(--text)' }}>{execRaw}</p>
      </div>
      <div style={{ background:'rgba(0,194,203,.05)', border:'1px solid rgba(0,194,203,.25)', borderLeft:'3px solid var(--cyan)', borderRadius:8, padding:16 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
          <span style={{ fontSize:10, fontWeight:700, letterSpacing:'.09em', textTransform:'uppercase', color:'var(--cyan)' }}>Point of View</span>
          <span style={{ fontSize:10, background:'rgba(0,194,203,.15)', color:'var(--cyan)', padding:'2px 8px', borderRadius:4, fontWeight:600 }}>Ready to use as outreach</span>
        </div>
        <p style={{ fontSize:13, lineHeight:1.8, color:'var(--text)' }}>{povRaw}</p>
      </div>
    </div>
  );
}

function StakeholderRenderer({ content }) {
  const rows = content.split('\n')
    .map(l => l.trim())
    .filter(l => l.startsWith('NAME:'))
    .map(l => {
      const get = (key) => { const m = l.match(new RegExp(key + ':\\s*([^|]+)')); return m?.[1]?.trim() || ''; };
      return { name: get('NAME'), title: get('TITLE'), dept: get('DEPT'), stance: get('STANCE'), action: get('ACTION') };
    });

  if (!rows.length) return <div className="gen-block">{content}</div>;

  const stanceStyle = s => {
    const sl = s.toLowerCase();
    if (sl.includes('support')) return { color:'var(--green)',  bg:'rgba(34,197,94,.12)'  };
    if (sl.includes('risk'))    return { color:'var(--red)',    bg:'rgba(239,68,68,.12)'  };
    return                               { color:'var(--amber)', bg:'rgba(245,158,11,.12)' };
  };

  return (
    <div style={{ overflowX:'auto' }}>
      <table className="table">
        <thead>
          <tr>
            {['Name','Title','Department','Stance','Recommended Action'].map(h => <th key={h}>{h}</th>)}
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => {
            const ss = stanceStyle(r.stance);
            return (
              <tr key={i} style={{ background: i % 2 === 1 ? 'rgba(255,255,255,.018)' : 'transparent' }}>
                <td style={{ fontWeight:600, fontSize:12 }}>{r.name}</td>
                <td style={{ fontSize:12 }}>{r.title}</td>
                <td style={{ fontSize:12, color:'var(--muted)' }}>{r.dept}</td>
                <td>
                  <span className="badge" style={{ background:ss.bg, color:ss.color, fontSize:10 }}>{r.stance}</span>
                </td>
                <td style={{ fontSize:12 }}>{r.action}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function BusinessCaseRenderer({ content }) {
  const SECS = [
    { label:'CURRENT STATE',  color:'var(--amber)', bg:'rgba(245,158,11,.07)',  border:'rgba(245,158,11,.22)' },
    { label:'BUSINESS IMPACT',color:'#EF4444',       bg:'rgba(239,68,68,.07)',   border:'rgba(239,68,68,.22)'  },
    { label:'FUTURE STATE',   color:'var(--cyan)',   bg:'rgba(0,194,203,.06)',   border:'rgba(0,194,203,.22)'  },
  ];
  const allPat = SECS.map(s => s.label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
  const parsed = {};
  SECS.forEach(s => {
    const esc = s.label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const m = content.match(new RegExp(esc + '[^\\n]*\\n([\\s\\S]*?)(?=\\n(?:' + allPat + ')|$)', 'i'));
    if (m) parsed[s.label] = m[1].trim();
  });
  if (!Object.keys(parsed).length) return <div className="gen-block">{content}</div>;

  return (
    <div>
      {SECS.map(s => !parsed[s.label] ? null : (
        <div key={s.label} style={{ background:s.bg, border:'1px solid '+s.border, borderRadius:8, padding:'14px 16px', marginBottom:12 }}>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase', color:s.color, marginBottom:10 }}>{s.label}</div>
          <ul style={{ listStyle:'none', padding:0, margin:0 }}>
            {parsed[s.label].split('\n').filter(l => l.trim()).map((line, i) => (
              <li key={i} style={{ display:'flex', gap:8, marginBottom:6, fontSize:12.5, lineHeight:1.6, color:'var(--text)' }}>
                <span style={{ color:s.color, flexShrink:0, marginTop:2 }}>•</span>
                <span>{line.replace(/^[-•*]\s*/, '')}</span>
              </li>
            ))}
          </ul>
        </div>
      ))}
    </div>
  );
}

function AccountPlanSection({ acc, seller, sectionKey, sectionLabel }) {
  const stateKey = acc.name + '_' + sectionKey;

    seller.name === 'Alex Rivera' ? (PRE_POPULATED_PLANS[stateKey] || '') : ''
  );

  const generate = () => {
    setLoading(true);
    const simContent =

        : (SIMULATED_RESPONSES[stateKey] || '');
    setTimeout(() => {
      setContent(simContent);
      setLoading(false);
    }, 600);
  };

  const renderContent = () => {
    if (sectionKey === 'overview')     return <OverviewRenderer content={content} />;
    if (sectionKey === 'stakeholders') return <StakeholderRenderer content={content} />;

  return (
    <div>
      <div className="row-between" style={{ marginBottom:14 }}>

          <AiBadge />

function CoachingAgendaRenderer({ content }) {
  const SECTIONS = [
    { key:'PIPELINE SNAPSHOT',        color:'var(--blue)',  icon:'◉' },
    { key:'ACCOUNT SPOTLIGHT',        color:'var(--cyan)',  icon:'◆' },
    { key:'STRATEGY COACHING MOMENT', color:'var(--amber)', icon:'◐' },
    { key:"THIS WEEK'S FOCUS",        color:'var(--green)', icon:'◈' },
    { key:'RD COMMITMENT',            color:'var(--green)', icon:'◇' },
  ];

  const parsed = {};
  SECTIONS.forEach((s, i) => {
    const allEsc = SECTIONS.map(x => x.key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
    const esc = s.key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const m = content.match(new RegExp(esc + '[^\\n]*\\n+([\\s\\S]*?)(?=\\n+(?:' + allEsc + ')|$)', 'i'));

  if (!Object.keys(parsed).length) return <div className="gen-block">{content}</div>;

  return (
    <div>
      {SECTIONS.map(s => !parsed[s.key] ? null : (
        <div key={s.key} style={{
          background:'var(--card)',
          border:'1px solid var(--border)',
          borderLeft:'3px solid ' + s.color,
          borderRadius:8,

            {s.icon} {s.key}
          </div>
          <div style={{ fontSize:12.5, lineHeight:1.75, color:'var(--text)', whiteSpace:'pre-wrap' }}>{parsed[s.key]}</div>
        </div>
      ))}
    </div>
  );
}

function Screen5({ sellers }) {
  const [selId, setSelId] = useState(null);
  const [agenda, setAgenda] = useState('');
  const [loading, setLoading] = useState(false);

  const sel = sellers.find(s => s.id === selId);

  const generateAgenda = () => {
    if (!sel) return;
    setLoading(true);
    const content = PRE_COACHING[sel.id] || PRE_COACHING['alex'];
    setTimeout(() => {
      setAgenda(content);
      setLoading(false);
    }, 600);
  };

  return (
    <div>
      <h2 style={{ marginBottom:20 }}>Weekly Coaching Dashboard</h2>

      <div className="grid-3 section-gap">
        {sellers.map(s => {
          const cov = covRatio(s.pipeline, s.quota);
          const rat = cov / 3.5;
          const heat = heatRatio(rat);
          return (
            <div
              key={s.id}
              className={'heat-card heat-' + heat + (selId === s.id ? '' : '')}

                <ScoreCircle score={s.plan_score} />
              </div>

              <div style={{ marginBottom:8 }}>
                <div className="row-between" style={{ marginBottom:4 }}>
                  <span style={{ fontSize:11, color:'var(--muted)' }}>Pipeline Coverage</span>
                  <span className="mono" style={{ fontSize:12, color: heat==='green'?'var(--green)':heat==='amber'?'var(--amber)':'var(--red)' }}>
                    {cov.toFixed(1)}x / 3.5x
                  </span>
                </div>
                <ProgBar value={cov} max={3.5} color={heat==='green'?'var(--green)':heat==='amber'?'var(--amber)':'var(--red)'} height={6} />
              </div>

              <div className="grid-2" style={{ gap:8, marginBottom:10 }}>
                <div>
                  <div style={{ fontSize:10, color:'var(--dim)', textTransform:'uppercase', letterSpacing:'.06em' }}>Commit</div>
                  <div className="mono" style={{ fontSize:13 }}>{fmtM(s.forecast_commit)}</div>

                <div>
                  <div style={{ fontSize:10, color:'var(--dim)', textTransform:'uppercase', letterSpacing:'.06em' }}>YTD</div>
                  <div className="mono" style={{ fontSize:13 }}>{fmtM(s.ytd_closed)}</div>

              </div>

              <div className="row-between">
                <StatusTag status={s.plan_status} />
                <span style={{ fontSize:11, color:'var(--muted)' }}>{s.open_opps} open opps</span>

                </div>

            </div>
          );

      {selId && (
        <div className="card">
          <div className="row-between" style={{ marginBottom:14 }}>

                <span>Coverage: <span style={{ color:cc }}>{cov.toFixed(1)}x</span></span>
                <span>Commit: <span className="mono" style={{ color:'var(--text)' }}>{fmtM(s.forecast_commit)}</span></span>
                <span>YTD: <span className="mono" style={{ color:'var(--text)' }}>{fmtM(s.ytd_closed)}</span></span>
                <span>Score: <span style={{ color:scoreColor(s.plan_score) }}>{s.plan_score}</span></span>
              </div>
            </div>
          );
        })}
      </div>

      <div className="card">
        <div className="row-between" style={{ marginBottom:14 }}>
          <div className="row"><AiBadge /><h3 style={{ marginLeft:8 }}>AI Executive Summary</h3></div>
          <button className="btn-primary" disabled={loading} onClick={generateSummary}>
            {loading ? <><Spinner /> Generating...</> : '✦ Generate Executive Summary'}
          </button>
        </div>
        {summary
          ? <ExecSummaryRenderer content={summary} />
          : <div style={{ fontSize:12, color:'var(--dim)', padding:'16px 0' }}>Click Generate to create an AI-powered executive summary for VP/CRO consumption.</div>
        }
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = useState('dashboard');
  const [selectedSeller, setSelectedSeller] = useState('alex');
  const [sellers, setSellers] = useState(SELLERS_DATA);

  const seller = sellers.find(s => s.id === selectedSeller) || sellers[0];
  const showSeller = ['territory','accounts'].includes(screen);

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar
        sellers={sellers}
        screen={screen}
        selectedSeller={selectedSeller}
        onNav={setScreen}
        onSelectSeller={setSelectedSeller}
      />
      <div className="main">
        <Topbar screen={screen} seller={showSeller ? seller : null} />
        <div className="content">
          {screen === 'dashboard' && (
            <Screen1
              sellers={sellers}
              setSellers={setSellers}
              onNav={setScreen}
              onSelectSeller={setSelectedSeller}
            />
          )}
          {screen === 'territory' && (
            <Screen2
              key={seller.id}
              seller={seller}
              sellers={sellers}
              setSellers={setSellers}
            />
          )}
          {screen === 'accounts' && (
            <Screen3
              key={seller.id}
              seller={seller}
            />
          )}
          {screen === 'coaching' && (
            <Screen5 sellers={sellers} />
          )}
          {screen === 'executive' && (
            <Screen6 sellers={sellers} />
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
